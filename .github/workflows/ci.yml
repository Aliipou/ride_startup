name: CI — Test, Lint, Security Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy types-redis
          mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # non-blocking for now, enable strict in v3

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r app/ -ll -ii  # only high severity + high confidence

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key-at-least-32-chars
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          ENVIRONMENT: test
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ── Web (User PWA) ────────────────────────────────────────────────────────────
  web-test:
    name: Web Tests (Next.js User)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Run tests
        run: npm test -- --coverage --watchAll=false --ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.rideandchill.fi
          NEXT_PUBLIC_WS_URL: wss://api.rideandchill.fi
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

  # ── Rider PWA ────────────────────────────────────────────────────────────────
  rider-test:
    name: Rider Tests (Next.js PWA)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rider

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rider/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --watchAll=false --ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.rideandchill.fi
          NEXT_PUBLIC_WS_URL: wss://api.rideandchill.fi
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
        run: npm run build

  # ── Admin Panel ───────────────────────────────────────────────────────────────
  admin-test:
    name: Admin Tests (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --watchAll=false --ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.rideandchill.fi
        run: npm run build

  # ── Security scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code (trufflesecurity)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Audit Node.js dependencies (web)
        run: npm audit --audit-level=high
        working-directory: web
        continue-on-error: true

      - name: Audit Node.js dependencies (rider)
        run: npm audit --audit-level=high
        working-directory: rider
        continue-on-error: true

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
        continue-on-error: true
