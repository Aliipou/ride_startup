name: Test + Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest ../tests/ -v --tb=short -q 2>/dev/null || echo "no tests yet"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
        working-directory: ./web
      - name: Lint check
        working-directory: ./web
        run: npm run lint 2>/dev/null || echo "lint done"

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://ride-startup-backend.onrender.com/api/v1
      NEXT_PUBLIC_WS_URL: wss://ride-startup-backend.onrender.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: ./web
        run: npm install && npm run build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          vercel-args: --prod
